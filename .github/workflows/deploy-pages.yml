name: Deploy frontend to GitHub Pages

# Builds web/frontend and publishes it to GitHub Pages. The live API calls go to
# the backend URL configured in the repo variable VITE_API_BASE (Settings →
# Secrets and variables → Actions → Variables). Without it, only the manual
# calculator + checklist work; Radar/Screener/Chat need that backend.

on:
  push:
    branches: [main]
    paths:
      - "web/frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        working-directory: web/frontend
        env:
          # Project site lives at https://<user>.github.io/Memecoin-Screener/
          VITE_BASE: /Memecoin-Screener/
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm install
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
