# Render blueprint for the backend API (web/server). One free web service.
# Render injects PORT; the server reads process.env.PORT. Deploy via
# https://dashboard.render.com → New → Blueprint → pick this repo.
#
# Safe to expose publicly: writes (settings/alert/batch) are gated behind
# ADMIN_TOKEN, and chat/scan are rate-limited + daily-budgeted (see middleware/
# guard.js). Radar/Screener work with no keys at all (DexScreener free API).
# `sync: false` env vars are NOT stored in git — Render prompts for them on deploy.
services:
  - type: web
    name: memecoin-screener-api
    runtime: node
    rootDir: web/server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: RADAR_INTERVAL_MIN
        value: "15"
      # Per-day cap on public AI chat calls (bounds token spend).
      - key: CHAT_DAILY_MAX
        value: "200"
      # Set to enable AI Chat for the public (otherwise chat shows "no key").
      - key: ANTHROPIC_API_KEY
        sync: false
      # Required to administer settings remotely (Authorization: Bearer <token>).
      # Without it, write endpoints are blocked from non-loopback callers.
      - key: ADMIN_TOKEN
        sync: false
