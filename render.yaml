# Render blueprint — SATU service gratis yang menyajikan frontend + backend dari
# satu URL (mis. https://memecoin-screener.onrender.com). Deploy via
# https://dashboard.render.com → New → Blueprint → pilih repo ini.
#
# Cara kerja: buildCommand membangun web/frontend (Vite → dist/), lalu meng-install
# deps web/server. startCommand menjalankan Express, yang otomatis menyajikan
# web/frontend/dist untuk semua route non-/api (lihat web/server/index.js). Karena
# satu origin, tidak perlu VITE_API_BASE dan tidak ada CORS.
#
# Aman diekspos publik: writes (settings/alert/batch) digate ADMIN_TOKEN, chat/scan
# di-rate-limit + budget harian (middleware/guard.js). Radar/Screener jalan tanpa
# key apa pun (DexScreener API gratis). `sync: false` = tidak disimpan di git;
# Render menanyakannya saat deploy (boleh dikosongkan).
services:
  - type: web
    name: memecoin-screener
    runtime: node
    plan: free
    buildCommand: cd web/frontend && npm install && npm run build && cd ../server && npm install
    startCommand: cd web/server && npm start
    envVars:
      - key: RADAR_INTERVAL_MIN
        value: "15"
      # Per-day cap on public AI chat calls (bounds token spend).
      - key: CHAT_DAILY_MAX
        value: "200"
      # Set to enable AI Chat for the public (otherwise chat shows "no key").
      - key: ANTHROPIC_API_KEY
        sync: false
      # Required to administer settings remotely (Authorization: Bearer <token>).
      # Without it, write endpoints are blocked from non-loopback callers.
      - key: ADMIN_TOKEN
        sync: false
